name: build

on:
  schedule:
    - cron: '0 12 */2 * *'
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      scheme:
        description: "scheme"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - rootless
          - rootful
          - roothide

jobs:
  sync-fork:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Hide Sensitive Inputs
        uses: levibostian/action-hide-sensitive-inputs@v1
        
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
          token: ${{ secrets.MEOW }}
        
      - name: Sync Fork with Upstream
        env:
          GH_TOKEN: ${{ secrets.MEOW }}
        run: |
          gh repo sync ${{ github.repository }} -b ${{ github.ref_name }}

  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    needs: sync-fork
    steps:
      - name: set matrix
        id: set-matrix
        run: |
          SCHEME="${{ github.event.inputs.scheme }}"
          if [ -z "$SCHEME" ] || [ "$SCHEME" = "all" ]; then
            echo 'matrix=["rootless","rootful","roothide"]' >> $GITHUB_OUTPUT
          else
            echo "matrix=[\"$SCHEME\"]" >> $GITHUB_OUTPUT
          fi

  build:
    needs: setup
    runs-on: macos-latest
    strategy:
      matrix:
        scheme: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false

    env:
      DEVICE_TARGET: "iphone:clang:16.5:14.0"

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: setup theos
        uses: actions/checkout@v4
        with:
          repository: roothide/theos
          path: theos
          submodules: recursive

      - name: cache sdks
        id: cache-sdks
        uses: actions/cache@v4
        with:
          path: theos/sdks
          key: theos-sdks-16.5

      - name: download sdks
        if: steps.cache-sdks.outputs.cache-hit != 'true'
        run: |
          curl -LO https://github.com/theos/sdks/archive/master.zip
          unzip -q master.zip
          mkdir -p theos/sdks
          mv sdks-master/*.sdk theos/sdks/
          rm -rf master.zip sdks-master

      - name: set THEOS env var
        run: echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV

      - name: install deps
        run: |
          brew install ldid make
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      - name: build (${{ matrix.scheme }})
        run: |
          SCHEME_FLAG=""
          if [ "${{ matrix.scheme }}" = "rootless" ]; then
            SCHEME_FLAG="THEOS_PACKAGE_SCHEME=rootless"
          elif [ "${{ matrix.scheme }}" = "roothide" ]; then
            SCHEME_FLAG="THEOS_PACKAGE_SCHEME=roothide"
          fi
          make clean
          make package \
            ARCHS="arm64 arm64e" \
            TARGET="$DEVICE_TARGET" \
            FINALPACKAGE=1 \
            $SCHEME_FLAG

      - name: upload package (${{ matrix.scheme }})
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.scheme }}-package
          path: packages/*.deb

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v3.0.0
        with:
          token: ${{ secrets.MEOW }}
          tag_name: nethunter-${{ needs.sync-fork.outputs.timestamp }}
          files: |
            build/outputs/apk/release/*.apk
